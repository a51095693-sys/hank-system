<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客訴反饋系統 - 逾期結案</title>
<link rel="preconnect" href="https://www.gstatic.com" crossorigin>
<link rel="preconnect" href="https://identitytoolkit.googleapis.com">
<link rel="preconnect" href="https://firestore.googleapis.com">
<link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js">
<link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js">
<link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="mob-header">
  <button class="mob-menu-btn" onclick="toggleMenu()">☰</button>
  <span class="mob-title">⚠️ 逾期結案</span>
  <span></span>
</div>
<div class="mob-overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sb-brand"><h2>📢 客訴反饋系統</h2><p>管理端</p></div>
    <nav class="sb-nav" id="sb-nav"></nav>
    <div class="sb-user" id="sb-user-area"><div class="uname" style="color:rgba(255,255,255,.4);font-size:12px;">載入中…</div></div>
  </aside>
  <main class="main">
    <div class="page-title">⚠️ 逾期結案</div>
    <p style="font-size:13px;color:var(--text3);margin-top:-12px;margin-bottom:16px;">超過2天尚未結案的客訴，請即時處理或說明原因。</p>

    <div class="card">
      <div class="flex gap-2 flex-wrap items-center" style="margin-bottom:12px;">
        <input type="text" class="form-control mob-tool-search" id="searchInput" placeholder="🔍 搜尋門市、描述…" style="width:auto;min-width:160px;" oninput="filterTable()">
        <button class="btn btn-outline btn-sm" onclick="loadData()">🔄 重新整理</button>
        <span id="countBadge" style="font-size:12px;color:var(--text3);"></span>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>日期</th><th>提交者</th><th>門市／客戶</th><th>類型</th><th>品項</th><th>描述</th><th>狀態</th><th>負責人</th><th>逾期原因</th><th></th></tr></thead>
          <tbody id="dataTable"><tr><td colspan="10" class="text-muted text-center" style="padding:24px;">載入中…</td></tr></tbody>
        </table>
      </div>
    </div>
  </main>
</div>
<div class="toast" id="toast"></div>

<!-- 審核回覆 Modal -->
<div class="modal-bg" id="replyModal">
  <div class="modal">
    <div class="modal-title">📝 客訴詳情與回覆</div>
    <div id="modalInfo" style="background:var(--surface2);border-radius:10px;padding:14px;margin-bottom:16px;font-size:13px;line-height:1.8;"></div>
    <div style="margin-bottom:12px;">
      <label class="form-label">處理狀態</label>
      <select class="form-control" id="mStatus">
        <option value="待處理">待處理</option>
        <option value="處理中">處理中</option>
        <option value="已結案">已結案</option>
      </select>
    </div>
    <div style="margin-bottom:12px;">
      <label class="form-label">指派負責人</label>
      <select class="form-control" id="mAssignee"><option value="">未指派</option></select>
    </div>
    <div style="margin-bottom:12px;">
      <label class="form-label">對話紀錄</label>
      <div id="threadBox" style="display:flex;flex-direction:column;gap:8px;max-height:220px;overflow-y:auto;background:var(--surface2);border-radius:10px;padding:10px;"></div>
    </div>
    <div style="margin-bottom:16px;">
      <label class="form-label">新增回覆 <span style="color:var(--primary);font-size:10px;">（提交者可見）</span></label>
      <textarea class="form-control" id="mReply" placeholder="輸入回覆內容…" style="min-height:80px;"></textarea>
    </div>
    <div class="flex gap-2">
      <button class="btn btn-primary w-full" onclick="saveReply()">💾 儲存</button>
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
    </div>
    <input type="hidden" id="mId">
  </div>
</div>

<!-- 圖片放大檢視 -->
<div id="imgLightbox" onclick="this.style.display='none'" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:99999;align-items:center;justify-content:center;cursor:zoom-out;">
  <img id="imgLightboxImg" style="max-width:92vw;max-height:92vh;border-radius:8px;">
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs, updateDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { firebaseConfig } from "./firebase-config.js";
import { getUserData, showToast, renderSidebar, logAudit } from "./app.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app, 'default');
let _ud, _records = {};

window.toggleMenu = () => { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('show'); };
window.doSignOut = async () => { sessionStorage.clear(); await signOut(auth); window.location.href = 'index.html'; };
window.showImage = (src) => { document.getElementById('imgLightboxImg').src = src; document.getElementById('imgLightbox').style.display = 'flex'; };

let _isManager = false;
let _assigneeOptions = '<option value="">未指派</option>';

async function loadAssignees() {
  try {
    const snap = await getDocs(collection(db, 'accounts'));
    const names = snap.docs.map(d => d.data().name).filter(Boolean).sort();
    _assigneeOptions = '<option value="">未指派</option>' + names.map(n => `<option value="${n}">${n}</option>`).join('');
  } catch(e) {}
}

onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = 'index.html'; return; }
  _ud = await getUserData(db, user);
  if (_ud.role !== 'admin' && _ud.role !== 'manager') { window.location.href = 'submit.html'; return; }
  _isManager = _ud.role === 'manager';
  renderSidebar(_ud, 'overdue.html', auth);
  loadAssignees();
  loadData();
});

const OVERDUE_MS = 2 * 24 * 60 * 60 * 1000;
function isOverdue(e) {
  if (e.status === '已結案') return false;
  if (!e.createdAt?.seconds) return false;
  return (Date.now() - e.createdAt.seconds * 1000) > OVERDUE_MS;
}

function lastMessage(e) {
  if (e.messages && e.messages.length) return e.messages[e.messages.length - 1];
  if (e.reply) return { from: 'admin', name: e.repliedBy || '管理員', text: e.reply };
  return null;
}

window.loadData = async () => {
  const tbody = document.getElementById('dataTable');
  tbody.innerHTML = '<tr><td colspan="10" class="text-muted text-center" style="padding:24px;">載入中…</td></tr>';
  try {
    const snap = await getDocs(collection(db, 'complaints'));
    const scopedDocs = (_isManager && _ud.store && _ud.store !== '總公司')
      ? snap.docs.filter(d => d.data().store === _ud.store)
      : snap.docs;
    const overdueDocs = scopedDocs.filter(d => isOverdue(d.data()));

    const sorted = overdueDocs.slice().sort((a, b) => {
      const ua = a.data().urgent ? 1 : 0, ub = b.data().urgent ? 1 : 0;
      if (ua !== ub) return ub - ua;
      return (a.data().createdAt?.seconds || 0) - (b.data().createdAt?.seconds || 0);
    });

    _records = {};
    document.getElementById('countBadge').textContent = `共 ${sorted.length} 筆逾期`;
    if (sorted.length === 0) {
      tbody.innerHTML = '<tr><td colspan="10" class="text-muted text-center" style="padding:24px;">目前沒有逾期未結案的客訴 🎉</td></tr>';
      return;
    }

    tbody.innerHTML = sorted.map(d => {
      const e = d.data(); _records[d.id] = e;
      const search = [e.store, e.desc, e.submittedBy, e.item].join(' ').toLowerCase();
      const reasonHtml = e.overdueReason
        ? `<span style="font-size:12px;">📝 ${e.overdueReason}<div style="color:var(--text3);font-size:11px;margin-top:2px;">— ${e.overdueReasonBy||''}</div></span>`
        : `<span style="font-size:12px;color:var(--danger);">尚未說明</span>`;
      const urgentBadge = e.urgent ? ` <span title="緊急" style="font-size:11px;color:var(--danger);font-weight:700;">🚨緊急</span>` : '';
      return `<tr data-search="${search}" style="${e.urgent?'background:#FEE2E2;':''}">
        <td data-label="日期" style="white-space:nowrap;">${e.date}</td>
        <td data-label="提交者"><span class="badge badge-blue">${e.submittedBy||'-'}</span></td>
        <td data-label="門市／客戶"><strong>${e.store}</strong>${urgentBadge}</td>
        <td data-label="類型" style="white-space:nowrap;">${e.type}</td>
        <td data-label="品項">${e.item||'-'}</td>
        <td data-label="描述" style="max-width:160px;white-space:normal;">${e.desc}${e.hasMedia?` <span title="含附件">📎${e.mediaCount>1?` ×${e.mediaCount}`:''}</span>`:''}</td>
        <td data-label="狀態"><span class="badge badge-${e.status}">${e.status}</span></td>
        <td data-label="負責人">${e.assignedTo?`<span class="badge" style="background:#EDE9FE;color:#6D28D9;">${e.assignedTo}</span>`:`<span class="text-muted" style="font-size:12px;">-</span>`}</td>
        <td data-label="逾期原因" style="max-width:200px;">${reasonHtml}</td>
        <td><button class="btn btn-primary btn-sm" onclick="openModal('${d.id}')">審核</button></td>
      </tr>`;
    }).join('');
  } catch(err) {
    tbody.innerHTML = '<tr><td colspan="10" class="text-muted text-center" style="padding:24px;">載入失敗</td></tr>';
  }
};

window.filterTable = () => {
  const kw = document.getElementById('searchInput').value.toLowerCase();
  document.querySelectorAll('#dataTable tr[data-search]').forEach(tr => {
    tr.style.display = tr.dataset.search.includes(kw) ? '' : 'none';
  });
};

function renderThread(e) {
  const msgs = e.messages && e.messages.length ? e.messages : (e.reply ? [{ from: 'admin', name: e.repliedBy || '管理員', text: e.reply }] : []);
  if (!msgs.length) return '<div style="color:var(--text3);font-size:12px;text-align:center;padding:8px;">尚無對話訊息</div>';
  return msgs.map(m => {
    const isAdmin = m.from === 'admin';
    const timeStr = m.at ? new Date(m.at).toLocaleString('zh-TW', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }) : '';
    return `<div style="align-self:${isAdmin?'flex-end':'flex-start'};max-width:85%;background:${isAdmin?'#EFF6FF':'#fff'};border:1px solid ${isAdmin?'#BFDBFE':'var(--border)'};border-radius:10px;padding:8px 12px;">
      <div style="font-size:11px;font-weight:700;color:${isAdmin?'#3B82F6':'var(--text2)'};margin-bottom:2px;">${m.name || (isAdmin?'管理員':'員工')}</div>
      <div style="font-size:13px;color:var(--text1);">${m.text}</div>
      ${timeStr?`<div style="font-size:10px;color:var(--text3);margin-top:3px;text-align:right;">${timeStr}</div>`:''}
    </div>`;
  }).join('');
}

window.openModal = async (id) => {
  const e = _records[id]; if (!e) return;
  document.getElementById('mId').value = id;
  document.getElementById('mStatus').value = e.status;
  document.getElementById('mAssignee').innerHTML = _assigneeOptions;
  document.getElementById('mAssignee').value = e.assignedTo || '';
  document.getElementById('mReply').value = '';
  document.getElementById('threadBox').innerHTML = renderThread(e);
  let overdueHtml = '';
  if (e.overdueReason) {
    overdueHtml = `<div style="margin-top:8px;padding:8px 10px;background:#FFFBEB;border:1px solid #FDE68A;border-radius:8px;">
      <strong style="color:#B45309;">⚠️ 已逾期未結案（超過2天）</strong>
      <div style="margin-top:4px;font-size:13px;">原因：${e.overdueReason}（${e.overdueReasonBy||''}）</div>
    </div>`;
  } else if (_isManager) {
    overdueHtml = `<div style="margin-top:8px;padding:8px 10px;background:#FFFBEB;border:1px solid #FDE68A;border-radius:8px;">
      <strong style="color:#B45309;">⚠️ 已逾期未結案（超過2天），請說明原因</strong>
      <textarea class="form-control" id="mOverdueReason" placeholder="請說明逾期原因…" style="min-height:60px;margin-top:8px;"></textarea>
      <button class="btn btn-outline btn-sm" style="margin-top:6px;" onclick="saveOverdueReason('${id}')">送出原因</button>
    </div>`;
  } else {
    overdueHtml = `<div style="margin-top:8px;padding:8px 10px;background:#FFFBEB;border:1px solid #FDE68A;border-radius:8px;">
      <strong style="color:#B45309;">⚠️ 已逾期未結案（超過2天）</strong>
      <div style="margin-top:4px;font-size:12px;color:var(--text3);">尚未由廠長／副廠長說明逾期原因</div>
    </div>`;
  }
  document.getElementById('modalInfo').innerHTML = `
    ${e.urgent?`<div style="color:var(--danger);font-weight:700;margin-bottom:4px;">🚨 緊急客訴</div>`:''}
    <div><strong>日期：</strong>${e.date}　<strong>提交者：</strong>${e.submittedBy||'-'}</div>
    <div><strong>門市／客戶：</strong>${e.store}　<strong>類型：</strong>${e.type}</div>
    ${e.item?`<div><strong>品項：</strong>${e.item}</div>`:''}
    <div style="margin-top:6px;"><strong>描述：</strong>${e.desc}</div>
    ${e.hasMedia?`<div style="margin-top:8px;" id="modalMedia">圖片載入中…</div>`:''}
    ${overdueHtml}
  `;
  document.getElementById('replyModal').classList.add('open');
  if (e.hasMedia) {
    try {
      const mSnap = await getDocs(collection(db, 'complaints', id, 'media'));
      const urls = mSnap.docs.map(d => d.data().url).filter(Boolean);
      const box = document.getElementById('modalMedia');
      if (box) {
        box.innerHTML = urls.length
          ? `<div style="display:flex;gap:8px;flex-wrap:wrap;">${urls.map(u => `<img src="${u}" style="width:90px;height:90px;object-fit:cover;border-radius:8px;cursor:zoom-in;" onclick="showImage(this.src)">`).join('')}</div>`
          : `<span class="text-muted" style="font-size:12px;">圖片載入失敗</span>`;
      }
    } catch(err) {
      const box = document.getElementById('modalMedia');
      if (box) box.innerHTML = `<span class="text-muted" style="font-size:12px;">圖片載入失敗</span>`;
    }
  }
};

window.closeModal = () => document.getElementById('replyModal').classList.remove('open');

window.saveOverdueReason = async (id) => {
  const ta = document.getElementById('mOverdueReason');
  const text = ta.value.trim();
  if (!text) { showToast('請輸入逾期原因', 'error'); return; }
  try {
    await updateDoc(doc(db, 'complaints', id), {
      overdueReason: text,
      overdueReasonBy: _ud.name,
      overdueReasonAt: Date.now()
    });
    _records[id].overdueReason = text;
    _records[id].overdueReasonBy = _ud.name;
    logAudit(db, _ud, '逾期原因說明', id, _records[id].store, text);
    showToast('已送出逾期原因', 'success');
    openModal(id);
    loadData();
  } catch(err) {
    showToast('送出失敗', 'error');
  }
};

window.saveReply = async () => {
  const id = document.getElementById('mId').value;
  const status = document.getElementById('mStatus').value;
  const assignedTo = document.getElementById('mAssignee').value;
  const text = document.getElementById('mReply').value.trim();
  try {
    const e = _records[id];
    const updates = { status, assignedTo };
    if (status === '已結案') updates.closedAt = serverTimestamp();
    if (text) {
      const msgs = e.messages && e.messages.length ? e.messages.slice() : (e.reply ? [{ from: 'admin', name: e.repliedBy || '管理員', text: e.reply }] : []);
      msgs.push({ from: 'admin', name: _ud.name, text, at: Date.now() });
      updates.messages = msgs;
    }
    await updateDoc(doc(db, 'complaints', id), updates);
    const logParts = [];
    if (status !== e.status) logParts.push(`狀態：${e.status} → ${status}`);
    if (assignedTo !== (e.assignedTo || '')) logParts.push(`負責人：${e.assignedTo || '未指派'} → ${assignedTo || '未指派'}`);
    if (text) logParts.push(`新增回覆：${text.slice(0, 50)}${text.length > 50 ? '…' : ''}`);
    if (logParts.length) logAudit(db, _ud, '更新客訴', id, e.store, logParts.join('；'));
    showToast('已儲存', 'success');
    closeModal();
    loadData();
  } catch(err) { showToast('儲存失敗', 'error'); }
};

document.getElementById('replyModal').addEventListener('click', e => { if(e.target===document.getElementById('replyModal')) closeModal(); });
</script>
</body>
</html>
