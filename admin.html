<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客訴反饋系統 - 管理端</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="mob-header">
  <button class="mob-menu-btn" onclick="toggleMenu()">☰</button>
  <span class="mob-title">📋 客訴管理</span>
  <span></span>
</div>
<div class="mob-overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sb-brand"><h2>📢 客訴反饋系統</h2><p>管理端</p></div>
    <nav class="sb-nav" id="sb-nav"></nav>
    <div class="sb-user" id="sb-user-area"><div class="uname" style="color:rgba(255,255,255,.4);font-size:12px;">載入中…</div></div>
  </aside>
  <main class="main">
    <div class="page-title">📋 所有客訴</div>

    <!-- 統計卡片 -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;">
      <div class="card" style="padding:16px;text-align:center;margin-bottom:0;">
        <div style="font-size:32px;font-weight:700;color:var(--danger);" id="statPending">-</div>
        <div style="font-size:12px;color:var(--text3);margin-top:4px;">待處理</div>
      </div>
      <div class="card" style="padding:16px;text-align:center;margin-bottom:0;">
        <div style="font-size:32px;font-weight:700;color:var(--warning);" id="statProcessing">-</div>
        <div style="font-size:12px;color:var(--text3);margin-top:4px;">處理中</div>
      </div>
      <div class="card" style="padding:16px;text-align:center;margin-bottom:0;">
        <div style="font-size:32px;font-weight:700;color:var(--success);" id="statDone">-</div>
        <div style="font-size:12px;color:var(--text3);margin-top:4px;">已結案</div>
      </div>
    </div>

    <div class="card">
      <div class="flex gap-2 flex-wrap items-center" style="margin-bottom:12px;">
        <input type="text" class="form-control" id="searchInput" placeholder="🔍 搜尋門市、描述…" style="width:auto;min-width:160px;" oninput="filterTable()">
        <select class="form-control" id="filterStatus" style="width:auto;" onchange="loadData()">
          <option value="">全部狀態</option>
          <option value="待處理">待處理</option>
          <option value="處理中">處理中</option>
          <option value="已結案">已結案</option>
        </select>
        <select class="form-control" id="filterType" style="width:auto;" onchange="loadData()">
          <option value="">全部類型</option>
          <option value="品質問題">品質問題</option>
          <option value="配送問題">配送問題</option>
          <option value="數量問題">數量問題</option>
          <option value="其他">其他</option>
        </select>
        <button class="btn btn-outline btn-sm" onclick="loadData()">🔄 重新整理</button>
        <button class="btn btn-primary btn-sm" onclick="openAddModal()">✚ 新增客訴</button>
        <span id="countBadge" style="font-size:12px;color:var(--text3);"></span>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>日期</th><th>提交者</th><th>門市／客戶</th><th>類型</th><th>品項</th><th>描述</th><th>狀態</th><th>最新訊息</th><th></th></tr></thead>
          <tbody id="dataTable"><tr><td colspan="9" class="text-muted text-center" style="padding:24px;">載入中…</td></tr></tbody>
        </table>
      </div>
    </div>
  </main>
</div>
<div class="toast" id="toast"></div>

<!-- 新增客訴 Modal -->
<div class="modal-bg" id="addModal">
  <div class="modal">
    <div class="modal-title">✚ 新增客訴</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:14px;">
      <div><label class="form-label">日期 *</label><input type="date" class="form-control" id="nDate"></div>
      <div><label class="form-label">門市／客戶 *</label><input type="text" class="form-control" id="nStore" placeholder="門市或客戶名稱"></div>
      <div><label class="form-label">客訴類型 *</label>
        <select class="form-control" id="nType">
          <option value="品質問題">品質問題</option>
          <option value="配送問題">配送問題</option>
          <option value="數量問題">數量問題</option>
          <option value="其他">其他</option>
        </select>
      </div>
      <div><label class="form-label">相關品項</label><input type="text" class="form-control" id="nItem" placeholder="選填"></div>
      <div style="grid-column:1/-1;"><label class="form-label">提交者</label><input type="text" class="form-control" id="nSubmitter" placeholder="例如：門市名稱或代為登錄人員"></div>
      <div style="grid-column:1/-1;"><label class="form-label">問題描述 *</label><textarea class="form-control" id="nDesc" placeholder="請詳細描述客訴內容…"></textarea></div>
    </div>
    <div class="flex gap-2">
      <button class="btn btn-primary w-full" id="addCBtn" onclick="createComplaint()">📨 送出客訴</button>
      <button class="btn btn-outline" onclick="closeAddModal()">取消</button>
    </div>
  </div>
</div>

<!-- 審核回覆 Modal -->
<div class="modal-bg" id="replyModal">
  <div class="modal">
    <div class="modal-title">📝 客訴詳情與回覆</div>
    <div id="modalInfo" style="background:var(--surface2);border-radius:10px;padding:14px;margin-bottom:16px;font-size:13px;line-height:1.8;"></div>
    <div style="margin-bottom:12px;">
      <label class="form-label">處理狀態</label>
      <select class="form-control" id="mStatus">
        <option value="待處理">待處理</option>
        <option value="處理中">處理中</option>
        <option value="已結案">已結案</option>
      </select>
    </div>
    <div style="margin-bottom:12px;">
      <label class="form-label">對話紀錄</label>
      <div id="threadBox" style="display:flex;flex-direction:column;gap:8px;max-height:220px;overflow-y:auto;background:var(--surface2);border-radius:10px;padding:10px;"></div>
    </div>
    <div style="margin-bottom:16px;">
      <label class="form-label">新增回覆 <span style="color:var(--primary);font-size:10px;">（提交者可見）</span></label>
      <textarea class="form-control" id="mReply" placeholder="輸入回覆內容…" style="min-height:80px;"></textarea>
    </div>
    <div class="flex gap-2">
      <button class="btn btn-primary w-full" onclick="saveReply()">💾 儲存</button>
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
    </div>
    <input type="hidden" id="mId">
  </div>
</div>

<!-- 確認刪除客訴 Modal -->
<div class="modal-bg" id="delComplaintModal">
  <div class="modal" style="max-width:360px;">
    <div class="modal-title" style="color:var(--danger);">⚠️ 確認刪除</div>
    <p style="font-size:13px;color:var(--text2);margin-bottom:20px;">確定要刪除門市／客戶 <strong id="delComplaintStore"></strong> 的這筆客訴嗎？此操作無法復原。</p>
    <div class="flex gap-2">
      <button class="btn btn-danger w-full" id="delComplaintConfirmBtn" onclick="confirmDeleteComplaint()">確認刪除</button>
      <button class="btn btn-outline" onclick="closeDelComplaint()">取消</button>
    </div>
    <input type="hidden" id="delComplaintId">
  </div>
</div>

<!-- 圖片放大檢視 -->
<div id="imgLightbox" onclick="this.style.display='none'" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:99999;align-items:center;justify-content:center;cursor:zoom-out;">
  <img id="imgLightboxImg" style="max-width:92vw;max-height:92vh;border-radius:8px;">
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { firebaseConfig } from "./firebase-config.js";
import { getUserData, showToast, renderSidebar, todayStr } from "./app.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app, 'default');
let _ud, _records = {};

window.toggleMenu = () => { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('show'); };
window.doSignOut = async () => { sessionStorage.clear(); await signOut(auth); window.location.href = 'index.html'; };
window.showImage = (src) => { document.getElementById('imgLightboxImg').src = src; document.getElementById('imgLightbox').style.display = 'flex'; };

onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = 'index.html'; return; }
  _ud = getUserData(db, user);
  if (_ud.role !== 'admin') { window.location.href = 'submit.html'; return; }
  renderSidebar(_ud, 'admin.html');
  loadData();
});

function lastMessage(e) {
  if (e.messages && e.messages.length) return e.messages[e.messages.length - 1];
  if (e.reply) return { from: 'admin', name: e.repliedBy || '管理員', text: e.reply };
  return null;
}

window.loadData = async () => {
  const tbody = document.getElementById('dataTable');
  tbody.innerHTML = '<tr><td colspan="9" class="text-muted text-center" style="padding:24px;">載入中…</td></tr>';
  try {
    const snap = await getDocs(collection(db, 'complaints'));
    const allDocs = snap.docs;

    // 統計（全部資料，不受篩選影響）
    const counts = { '待處理': 0, '處理中': 0, '已結案': 0 };
    allDocs.forEach(d => { const s = d.data().status; if (counts[s] !== undefined) counts[s]++; });
    document.getElementById('statPending').textContent = counts['待處理'];
    document.getElementById('statProcessing').textContent = counts['處理中'];
    document.getElementById('statDone').textContent = counts['已結案'];

    // 排序（由新到舊）
    const sorted = allDocs.slice().sort((a, b) => {
      return (b.data().createdAt?.seconds || 0) - (a.data().createdAt?.seconds || 0);
    });

    // 篩選
    const fs = document.getElementById('filterStatus').value;
    const ft = document.getElementById('filterType').value;
    const filtered = sorted.filter(d => {
      const e = d.data();
      if (fs && e.status !== fs) return false;
      if (ft && e.type !== ft) return false;
      return true;
    });

    _records = {};
    document.getElementById('countBadge').textContent = `共 ${filtered.length} 筆`;
    if (filtered.length === 0) {
      tbody.innerHTML = '<tr><td colspan="9" class="text-muted text-center" style="padding:24px;">無記錄</td></tr>';
      return;
    }

    tbody.innerHTML = filtered.map(d => {
      const e = d.data(); _records[d.id] = e;
      const search = [e.store, e.desc, e.submittedBy, e.item].join(' ').toLowerCase();
      const lm = lastMessage(e);
      const replyHtml = lm
        ? `<div style="font-size:12px;color:var(--success);line-height:1.5;">💬 ${lm.text}${lm.name ? `<div style="color:var(--text3);font-size:11px;margin-top:2px;">— ${lm.name}</div>` : ''}</div>`
        : `<span style="color:var(--text3);font-size:12px;">-</span>`;
      return `<tr data-search="${search}" style="${e.status==='待處理'?'background:#FFF5F5;':''}">
        <td style="white-space:nowrap;">${e.date}</td>
        <td><span class="badge badge-blue">${e.submittedBy||'-'}</span></td>
        <td><strong>${e.store}</strong></td>
        <td style="white-space:nowrap;">${e.type}</td>
        <td>${e.item||'-'}</td>
        <td style="max-width:160px;white-space:normal;">${e.desc}${e.mediaUrl?` <span title="含附件">📎</span>`:''}</td>
        <td><span class="badge badge-${e.status}">${e.status}</span></td>
        <td style="max-width:200px;">${replyHtml}</td>
        <td><div class="flex gap-2"><button class="btn btn-primary btn-sm" onclick="openModal('${d.id}')">審核</button><button class="btn btn-sm" style="background:#FEE2E2;color:var(--danger);" onclick="openDelComplaint('${d.id}','${e.store}')">刪除</button></div></td>
      </tr>`;
    }).join('');
  } catch(err) {
    tbody.innerHTML = '<tr><td colspan="9" class="text-muted text-center" style="padding:24px;">載入失敗</td></tr>';
  }
};

window.filterTable = () => {
  const kw = document.getElementById('searchInput').value.toLowerCase();
  document.querySelectorAll('#dataTable tr[data-search]').forEach(tr => {
    tr.style.display = tr.dataset.search.includes(kw) ? '' : 'none';
  });
};

function renderThread(e) {
  const msgs = e.messages && e.messages.length ? e.messages : (e.reply ? [{ from: 'admin', name: e.repliedBy || '管理員', text: e.reply }] : []);
  if (!msgs.length) return '<div style="color:var(--text3);font-size:12px;text-align:center;padding:8px;">尚無對話訊息</div>';
  return msgs.map(m => {
    const isAdmin = m.from === 'admin';
    return `<div style="align-self:${isAdmin?'flex-end':'flex-start'};max-width:85%;background:${isAdmin?'#EFF6FF':'#fff'};border:1px solid ${isAdmin?'#BFDBFE':'var(--border)'};border-radius:10px;padding:8px 12px;">
      <div style="font-size:11px;font-weight:700;color:${isAdmin?'#3B82F6':'var(--text2)'};margin-bottom:2px;">${m.name || (isAdmin?'管理員':'員工')}</div>
      <div style="font-size:13px;color:var(--text1);">${m.text}</div>
    </div>`;
  }).join('');
}

window.openModal = (id) => {
  const e = _records[id]; if (!e) return;
  document.getElementById('mId').value = id;
  document.getElementById('mStatus').value = e.status;
  document.getElementById('mReply').value = '';
  document.getElementById('threadBox').innerHTML = renderThread(e);
  document.getElementById('modalInfo').innerHTML = `
    <div><strong>日期：</strong>${e.date}　<strong>提交者：</strong>${e.submittedBy||'-'}</div>
    <div><strong>門市／客戶：</strong>${e.store}　<strong>類型：</strong>${e.type}</div>
    ${e.item?`<div><strong>品項：</strong>${e.item}</div>`:''}
    <div style="margin-top:6px;"><strong>描述：</strong>${e.desc}</div>
    ${e.mediaUrl?`<div style="margin-top:8px;"><img src="${e.mediaUrl}" style="max-width:100%;max-height:240px;border-radius:8px;cursor:zoom-in;" onclick="showImage(this.src)"></div>`:''}
  `;
  document.getElementById('replyModal').classList.add('open');
};

window.closeModal = () => document.getElementById('replyModal').classList.remove('open');

window.openDelComplaint = (id, store) => {
  document.getElementById('delComplaintId').value = id;
  document.getElementById('delComplaintStore').textContent = store;
  document.getElementById('delComplaintModal').classList.add('open');
};
window.closeDelComplaint = () => document.getElementById('delComplaintModal').classList.remove('open');

window.confirmDeleteComplaint = async () => {
  const id = document.getElementById('delComplaintId').value;
  const btn = document.getElementById('delComplaintConfirmBtn');
  btn.disabled = true;
  try {
    await deleteDoc(doc(db, 'complaints', id));
    showToast('客訴已刪除', 'success');
    closeDelComplaint();
    loadData();
  } catch(err) {
    showToast('刪除失敗', 'error');
  } finally {
    btn.disabled = false;
  }
};

window.openAddModal = () => {
  ['nStore','nItem','nSubmitter','nDesc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('nType').value = '品質問題';
  document.getElementById('nDate').value = todayStr();
  document.getElementById('addModal').classList.add('open');
};
window.closeAddModal = () => document.getElementById('addModal').classList.remove('open');

window.createComplaint = async () => {
  const date = document.getElementById('nDate').value;
  const store = document.getElementById('nStore').value.trim();
  const desc = document.getElementById('nDesc').value.trim();
  if (!date || !store || !desc) { showToast('請填寫必填欄位', 'error'); return; }
  const btn = document.getElementById('addCBtn');
  btn.disabled = true; btn.textContent = '送出中…';
  try {
    await addDoc(collection(db, 'complaints'), {
      date, store,
      type: document.getElementById('nType').value,
      item: document.getElementById('nItem').value.trim(),
      desc,
      status: '待處理', messages: [],
      submittedBy: document.getElementById('nSubmitter').value.trim() || _ud.name,
      submittedUid: auth.currentUser.uid,
      createdAt: serverTimestamp()
    });
    showToast('客訴已新增', 'success');
    closeAddModal();
    loadData();
  } catch(err) {
    showToast('新增失敗，請重試', 'error');
  } finally {
    btn.disabled = false; btn.textContent = '📨 送出客訴';
  }
};

window.saveReply = async () => {
  const id = document.getElementById('mId').value;
  const status = document.getElementById('mStatus').value;
  const text = document.getElementById('mReply').value.trim();
  try {
    const e = _records[id];
    const updates = { status };
    if (text) {
      const msgs = e.messages && e.messages.length ? e.messages.slice() : (e.reply ? [{ from: 'admin', name: e.repliedBy || '管理員', text: e.reply }] : []);
      msgs.push({ from: 'admin', name: _ud.name, text, at: Date.now() });
      updates.messages = msgs;
    }
    await updateDoc(doc(db, 'complaints', id), updates);
    showToast('已儲存', 'success');
    closeModal();
    loadData();
  } catch(err) { showToast('儲存失敗', 'error'); }
};

document.getElementById('replyModal').addEventListener('click', e => { if(e.target===document.getElementById('replyModal')) closeModal(); });
document.getElementById('addModal').addEventListener('click', e => { if(e.target===document.getElementById('addModal')) closeAddModal(); });
document.getElementById('delComplaintModal').addEventListener('click', e => { if(e.target===document.getElementById('delComplaintModal')) closeDelComplaint(); });
</script>
</body>
</html>
