<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客訴反饋系統 - 我的客訴</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="mob-header">
  <button class="mob-menu-btn" onclick="toggleMenu()">☰</button>
  <span class="mob-title">📋 我的客訴</span>
  <span></span>
</div>
<div class="mob-overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sb-brand"><h2>📢 客訴反饋系統</h2><p>內部管理平台</p></div>
    <nav class="sb-nav" id="sb-nav"></nav>
    <div class="sb-user" id="sb-user-area"><div class="uname" style="color:rgba(255,255,255,.4);font-size:12px;">載入中…</div></div>
  </aside>
  <main class="main">
    <div class="page-title">📋 我的客訴</div>

    <!-- 個人統計 -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;">
      <div class="card" style="padding:16px;text-align:center;margin-bottom:0;">
        <div style="font-size:32px;font-weight:700;color:var(--danger);" id="statPending">-</div>
        <div style="font-size:12px;color:var(--text3);margin-top:4px;">待處理</div>
      </div>
      <div class="card" style="padding:16px;text-align:center;margin-bottom:0;">
        <div style="font-size:32px;font-weight:700;color:var(--warning);" id="statProcessing">-</div>
        <div style="font-size:12px;color:var(--text3);margin-top:4px;">處理中</div>
      </div>
      <div class="card" style="padding:16px;text-align:center;margin-bottom:0;">
        <div style="font-size:32px;font-weight:700;color:var(--success);" id="statDone">-</div>
        <div style="font-size:12px;color:var(--text3);margin-top:4px;">已結案</div>
      </div>
    </div>

    <div class="card" style="padding:0;">
      <div style="padding:16px 20px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);">
        <input type="text" class="form-control" id="searchInput" placeholder="🔍 搜尋門市、描述…" style="max-width:220px;" oninput="filterTable()">
        <button class="btn btn-outline btn-sm" onclick="loadData()">🔄 重新整理</button>
        <span id="countBadge" style="font-size:12px;color:var(--text3);"></span>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>日期</th><th>門市／客戶</th><th>類型</th><th>品項</th><th>描述</th><th>附件</th><th>狀態</th><th>最新訊息</th><th></th></tr></thead>
          <tbody id="myTable"><tr><td colspan="9" class="text-muted text-center" style="padding:24px;">載入中…</td></tr></tbody>
        </table>
      </div>
    </div>
  </main>
</div>
<div class="toast" id="toast"></div>

<!-- 對話 Modal -->
<div class="modal-bg" id="threadModal">
  <div class="modal">
    <div class="modal-title">💬 客訴對話</div>
    <div id="threadInfo" style="background:var(--surface2);border-radius:10px;padding:14px;margin-bottom:16px;font-size:13px;line-height:1.8;"></div>
    <div style="margin-bottom:12px;">
      <label class="form-label">對話紀錄</label>
      <div id="threadBox" style="display:flex;flex-direction:column;gap:8px;max-height:220px;overflow-y:auto;background:var(--surface2);border-radius:10px;padding:10px;"></div>
    </div>
    <div style="margin-bottom:16px;">
      <label class="form-label">新增訊息</label>
      <textarea class="form-control" id="tMsg" placeholder="輸入訊息內容…" style="min-height:80px;"></textarea>
    </div>
    <div class="flex gap-2">
      <button class="btn btn-primary w-full" id="tSendBtn" onclick="sendMessage()">📨 送出訊息</button>
      <button class="btn btn-outline" onclick="closeThread()">關閉</button>
    </div>
    <input type="hidden" id="tId">
  </div>
</div>

<!-- 圖片放大檢視 -->
<div id="imgLightbox" onclick="this.style.display='none'" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:99999;align-items:center;justify-content:center;cursor:zoom-out;">
  <img id="imgLightboxImg" style="max-width:92vw;max-height:92vh;border-radius:8px;">
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, query, where, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { firebaseConfig } from "./firebase-config.js";
import { getUserData, showToast, renderSidebar } from "./app.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app, 'default');
let _ud, _records = {};

window.toggleMenu = () => { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('show'); };
window.doSignOut = async () => { sessionStorage.clear(); await signOut(auth); window.location.href = 'index.html'; };
window.showImage = (src) => { document.getElementById('imgLightboxImg').src = src; document.getElementById('imgLightbox').style.display = 'flex'; };

onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = 'index.html'; return; }
  _ud = getUserData(db, user);
  if (_ud.role === 'admin') { window.location.href = 'admin.html'; return; }
  renderSidebar(_ud, 'my.html');
  loadData();
});

function lastMessage(e) {
  if (e.messages && e.messages.length) return e.messages[e.messages.length - 1];
  if (e.reply) return { from: 'admin', name: e.repliedBy || '管理員', text: e.reply };
  return null;
}

function renderThread(e) {
  const msgs = e.messages && e.messages.length ? e.messages : (e.reply ? [{ from: 'admin', name: e.repliedBy || '管理員', text: e.reply }] : []);
  if (!msgs.length) return '<div style="color:var(--text3);font-size:12px;text-align:center;padding:8px;">尚無對話訊息</div>';
  return msgs.map(m => {
    const isAdmin = m.from === 'admin';
    return `<div style="align-self:${isAdmin?'flex-start':'flex-end'};max-width:85%;background:${isAdmin?'#EFF6FF':'#fff'};border:1px solid ${isAdmin?'#BFDBFE':'var(--border)'};border-radius:10px;padding:8px 12px;">
      <div style="font-size:11px;font-weight:700;color:${isAdmin?'#3B82F6':'var(--text2)'};margin-bottom:2px;">${m.name || (isAdmin?'管理員':'我')}</div>
      <div style="font-size:13px;color:var(--text1);">${m.text}</div>
    </div>`;
  }).join('');
}

window.loadData = async () => {
  const tbody = document.getElementById('myTable');
  tbody.innerHTML = '<tr><td colspan="9" class="text-muted text-center" style="padding:24px;">載入中…</td></tr>';
  try {
    const snap = await getDocs(query(
      collection(db, 'complaints'),
      where('submittedUid', '==', auth.currentUser.uid)
    ));

    const counts = { '待處理': 0, '處理中': 0, '已結案': 0 };
    snap.docs.forEach(d => { const s = d.data().status; if (counts[s] !== undefined) counts[s]++; });
    document.getElementById('statPending').textContent = counts['待處理'];
    document.getElementById('statProcessing').textContent = counts['處理中'];
    document.getElementById('statDone').textContent = counts['已結案'];

    if (snap.empty) {
      tbody.innerHTML = '<tr><td colspan="9" class="text-muted text-center" style="padding:24px;">尚無客訴記錄</td></tr>';
      document.getElementById('countBadge').textContent = '共 0 筆';
      return;
    }

    const sorted = snap.docs.slice().sort((a, b) =>
      (b.data().createdAt?.seconds || 0) - (a.data().createdAt?.seconds || 0)
    );

    document.getElementById('countBadge').textContent = `共 ${sorted.length} 筆`;
    tbody.innerHTML = sorted.map(d => {
      const e = d.data();
      _records[d.id] = e;
      const search = [e.store, e.desc, e.item].join(' ').toLowerCase();
      const last = lastMessage(e);
      const lastHtml = last
        ? `<div style="font-size:12px;"><strong>${last.from==='admin'?'廚房':'我'}：</strong>${last.text}</div>`
        : `<span class="text-muted" style="font-size:12px;">尚無對話</span>`;
      const mediaHtml = e.mediaUrl
        ? `<img src="${e.mediaUrl}" style="max-width:120px;max-height:90px;border-radius:6px;display:block;cursor:zoom-in;" onclick="showImage(this.src)">`
        : `<span class="text-muted" style="font-size:12px;">-</span>`;
      return `<tr data-search="${search}">
        <td style="white-space:nowrap;">${e.date}</td>
        <td><strong>${e.store}</strong></td>
        <td style="white-space:nowrap;">${e.type}</td>
        <td>${e.item||'-'}</td>
        <td style="max-width:180px;white-space:normal;">${e.desc}</td>
        <td>${mediaHtml}</td>
        <td><span class="badge badge-${e.status}">${e.status}</span></td>
        <td style="max-width:200px;">${lastHtml}</td>
        <td><button class="btn btn-outline btn-sm" onclick="openThread('${d.id}')">💬 對話</button></td>
      </tr>`;
    }).join('');
  } catch(err) {
    tbody.innerHTML = '<tr><td colspan="9" class="text-muted text-center" style="padding:24px;">載入失敗</td></tr>';
  }
};

window.openThread = (id) => {
  const e = _records[id];
  if (!e) return;
  document.getElementById('tId').value = id;
  document.getElementById('threadInfo').innerHTML = `
    <div><strong>日期：</strong>${e.date}　<strong>門市：</strong>${e.store}</div>
    <div><strong>類型：</strong>${e.type}　<strong>狀態：</strong><span class="badge badge-${e.status}">${e.status}</span></div>
    <div><strong>描述：</strong>${e.desc}</div>
  `;
  document.getElementById('threadBox').innerHTML = renderThread(e);
  document.getElementById('tMsg').value = '';
  document.getElementById('threadModal').classList.add('open');
};

window.closeThread = () => document.getElementById('threadModal').classList.remove('open');

window.sendMessage = async () => {
  const id = document.getElementById('tId').value;
  const text = document.getElementById('tMsg').value.trim();
  if (!text) { showToast('請輸入訊息內容', 'error'); return; }
  const btn = document.getElementById('tSendBtn');
  btn.disabled = true;
  try {
    const e = _records[id];
    const msgs = e.messages && e.messages.length ? e.messages.slice() : (e.reply ? [{ from: 'admin', name: e.repliedBy || '管理員', text: e.reply }] : []);
    msgs.push({ from: 'employee', name: _ud.name, text, at: Date.now() });
    await updateDoc(doc(db, 'complaints', id), { messages: msgs });
    showToast('訊息已送出', 'success');
    closeThread();
    loadData();
  } catch(err) {
    showToast('送出失敗', 'error');
  } finally {
    btn.disabled = false;
  }
};

document.getElementById('threadModal').addEventListener('click', e => { if(e.target===document.getElementById('threadModal')) closeThread(); });

window.filterTable = () => {
  const kw = document.getElementById('searchInput').value.toLowerCase();
  document.querySelectorAll('#myTable tr[data-search]').forEach(tr => {
    tr.style.display = tr.dataset.search.includes(kw) ? '' : 'none';
  });
};
</script>
</body>
</html>
