<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客訴反饋系統 - 提交客訴</title>
<link rel="preconnect" href="https://www.gstatic.com" crossorigin>
<link rel="preconnect" href="https://identitytoolkit.googleapis.com">
<link rel="preconnect" href="https://firestore.googleapis.com">
<link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js">
<link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js">
<link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="mob-header">
  <button class="mob-menu-btn" onclick="toggleMenu()">☰</button>
  <span class="mob-title">📝 提交客訴</span>
  <span></span>
</div>
<div class="mob-overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sb-brand"><h2>📢 客訴反饋系統</h2><p>內部管理平台</p></div>
    <nav class="sb-nav" id="sb-nav"></nav>
    <div class="sb-user" id="sb-user-area"><div class="uname" style="color:rgba(255,255,255,.4);font-size:12px;">載入中…</div></div>
  </aside>
  <main class="main">
    <div class="page-title">📝 提交客訴</div>

    <div class="card">
      <div id="submitFormGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:14px;">
        <div style="min-width:0;"><label class="form-label">日期 *</label><input type="date" class="form-control" id="fDate"></div>
        <div><label class="form-label">門市／客戶</label>
          <input type="text" class="form-control" id="fStore" disabled style="background:var(--surface2);color:var(--text2);">
        </div>
        <div><label class="form-label">客訴類型 *</label>
          <select class="form-control" id="fType">
            <option value="品質問題">品質問題</option>
            <option value="配送問題">配送問題</option>
            <option value="數量問題">數量問題</option>
            <option value="其他">其他</option>
          </select>
        </div>
        <div><label class="form-label">相關品項</label>
          <select class="form-control" id="fItem">
            <option value="">選填</option>
            <option value="雞肉">雞肉</option>
            <option value="好吃醬">好吃醬</option>
            <option value="雞湯">雞湯</option>
            <option value="辣椒">辣椒</option>
            <option value="貢丸">貢丸</option>
            <option value="魚丸">魚丸</option>
          </select>
        </div>
        <div><label class="form-label">標籤</label>
          <select class="form-control" id="fTag"><option value="">選填</option></select>
        </div>
        <div style="grid-column:1/-1;display:flex;align-items:center;gap:6px;">
          <input type="checkbox" id="fUrgent" style="width:16px;height:16px;cursor:pointer;">
          <label class="form-label" for="fUrgent" style="margin:0;cursor:pointer;color:var(--danger);">🚨 標記為緊急</label>
        </div>
        <div style="grid-column:1/-1;">
          <label class="form-label">問題描述 *</label>
          <textarea class="form-control" id="fDesc" placeholder="請詳細描述客訴內容…"></textarea>
          <div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap;" id="quickPhrases"></div>
        </div>
        <div style="grid-column:1/-1;">
          <label class="form-label">附加照片</label>
          <input type="file" class="form-control" id="fMedia" accept="image/jpeg,image/png,image/webp,image/gif" multiple onchange="previewMedia()">
          <div style="font-size:11px;color:var(--text3);margin-top:4px;">支援 JPG、PNG、WEBP、GIF，最多 4 張，圖片會自動壓縮（重新選擇會取代目前的照片）</div>
          <div id="mediaPreview" style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;"></div>
        </div>
      </div>
      <button class="btn btn-primary" id="submitBtn" onclick="submitComplaint()">📨 送出客訴</button>
    </div>
  </main>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, query, where, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { firebaseConfig } from "./firebase-config.js";
import { getUserData, showToast, todayStr, renderSidebar, loadTags, sendTG } from "./app.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app, 'default');
let _ud;

window.toggleMenu = () => { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('show'); };
window.doSignOut = async () => { sessionStorage.clear(); await signOut(auth); window.location.href = 'index.html'; };

document.getElementById('fDate').value = todayStr();

loadTags(db).then(tags => {
  document.getElementById('fTag').innerHTML = '<option value="">選填</option>' + tags.map(t => `<option value="${t.name}">${t.name}</option>`).join('');
});

const QUICK_PHRASES = ['未熟','異物','口味不佳','包裝破損','數量不足','配送延遲'];
document.getElementById('quickPhrases').innerHTML = QUICK_PHRASES.map(p =>
  `<button type="button" class="btn btn-outline btn-sm" onclick="insertPhrase('${p}')">${p}</button>`
).join('');
window.insertPhrase = (text) => {
  const ta = document.getElementById('fDesc');
  ta.value = ta.value ? `${ta.value}、${text}` : text;
  ta.focus();
};

function lastMessage(e) {
  if (e.messages && e.messages.length) return e.messages[e.messages.length - 1];
  if (e.reply) return { from: 'admin', name: e.repliedBy || '管理員', text: e.reply };
  return null;
}

async function checkUnreadReplies(uid) {
  try {
    const snap = await getDocs(query(collection(db, 'complaints'), where('submittedUid', '==', uid)));
    const unread = snap.docs.filter(d => { const m = lastMessage(d.data()); return m && m.from === 'admin'; }).length;
    if (unread > 0) showToast(`💬 您有 ${unread} 筆客訴有新回覆，請至「我的客訴」查看`, 'success');
  } catch(e) {}
}

onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = 'index.html'; return; }
  _ud = await getUserData(db, user);
  if (_ud.role === 'admin' || _ud.role === 'manager') { window.location.href = 'admin.html'; return; }
  document.getElementById('fStore').value = _ud.store || '尚未設定門市，請聯絡管理員';
  renderSidebar(_ud, 'submit.html', auth);
  checkUnreadReplies(user.uid);
});

const ALLOWED_TYPES = ['image/jpeg','image/png','image/webp','image/gif'];
const MAX_PHOTOS = 4;
let _selectedFiles = [];

function compressImage(file, maxBytes = 700000) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = e => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        let { width, height } = img;
        const maxDim = 1280;
        if (width > maxDim || height > maxDim) {
          const scale = maxDim / Math.max(width, height);
          width = Math.round(width * scale);
          height = Math.round(height * scale);
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        let quality = 0.8;
        let dataUrl = canvas.toDataURL('image/jpeg', quality);
        while (dataUrl.length > maxBytes && quality > 0.3) {
          quality -= 0.1;
          dataUrl = canvas.toDataURL('image/jpeg', quality);
        }
        resolve(dataUrl);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function renderMediaPreview() {
  const box = document.getElementById('mediaPreview');
  box.innerHTML = _selectedFiles.map((file, i) => {
    const url = URL.createObjectURL(file);
    return `<div style="position:relative;">
      <img src="${url}" style="width:90px;height:90px;object-fit:cover;border-radius:8px;border:1px solid var(--border);">
      <button type="button" onclick="removePhoto(${i})" style="position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:var(--danger);color:#fff;border:none;cursor:pointer;font-size:12px;line-height:1;">✕</button>
    </div>`;
  }).join('');
}

window.removePhoto = (i) => {
  _selectedFiles.splice(i, 1);
  renderMediaPreview();
};

window.previewMedia = () => {
  const files = Array.from(document.getElementById('fMedia').files);
  if (!files.length) return;
  const invalid = files.find(f => !ALLOWED_TYPES.includes(f.type));
  if (invalid) {
    showToast('只支援 JPG、PNG、WEBP、GIF 圖片格式', 'error');
    document.getElementById('fMedia').value = '';
    return;
  }
  if (files.length > MAX_PHOTOS) {
    showToast(`最多只能附加 ${MAX_PHOTOS} 張照片`, 'error');
    document.getElementById('fMedia').value = '';
    return;
  }
  _selectedFiles = files;
  renderMediaPreview();
};

window.submitComplaint = async () => {
  const date = document.getElementById('fDate').value;
  const store = _ud.store;
  const desc = document.getElementById('fDesc').value.trim();
  if (!store) { showToast('您的帳號尚未設定門市，請聯絡管理員', 'error'); return; }
  if (!date || !desc) { showToast('請填寫必填欄位', 'error'); return; }
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '送出中…';
  try {
    const mediaUrls = [];
    if (_selectedFiles.length) {
      btn.textContent = '處理圖片中…';
      for (const file of _selectedFiles) {
        mediaUrls.push(await compressImage(file));
      }
    }
    const docRef = await addDoc(collection(db, 'complaints'), {
      date, store,
      type: document.getElementById('fType').value,
      item: document.getElementById('fItem').value.trim(),
      tag: document.getElementById('fTag').value,
      desc,
      urgent: document.getElementById('fUrgent').checked,
      hasMedia: mediaUrls.length > 0,
      mediaCount: mediaUrls.length,
      status: '待處理', messages: [],
      submittedBy: _ud.name, submittedUid: auth.currentUser.uid,
      createdAt: serverTimestamp()
    });
    for (const url of mediaUrls) {
      await addDoc(collection(db, 'complaints', docRef.id, 'media'), { url });
    }
    const isUrgent = document.getElementById('fUrgent').checked;
    const fType = document.getElementById('fType').value;
    sendTG(`${isUrgent ? '🚨 緊急客訴！' : '📨 員工送出客訴'}\n門市：${store}\n類型：${fType}\n描述：${desc.slice(0, 60)}${desc.length > 60 ? '…' : ''}`);
    showToast('客訴已送出', 'success');
    ['fItem','fTag','fDesc'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('fType').value = '品質問題';
    document.getElementById('fUrgent').checked = false;
    document.getElementById('fDate').value = todayStr();
    document.getElementById('fMedia').value = '';
    _selectedFiles = [];
    document.getElementById('mediaPreview').innerHTML = '';
  } catch(err) { showToast('送出失敗，請重試', 'error'); }
  finally { btn.disabled = false; btn.textContent = '📨 送出客訴'; }
};
</script>
</body>
</html>
