<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客訴反饋系統 - 提交客訴</title>
<link rel="preconnect" href="https://www.gstatic.com" crossorigin>
<link rel="preconnect" href="https://identitytoolkit.googleapis.com">
<link rel="preconnect" href="https://firestore.googleapis.com">
<link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js">
<link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js">
<link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="mob-header">
  <button class="mob-menu-btn" onclick="toggleMenu()">☰</button>
  <span class="mob-title">📝 提交客訴</span>
  <span></span>
</div>
<div class="mob-overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sb-brand"><h2>📢 客訴反饋系統</h2><p>內部管理平台</p></div>
    <nav class="sb-nav" id="sb-nav"></nav>
    <div class="sb-user" id="sb-user-area"><div class="uname" style="color:rgba(255,255,255,.4);font-size:12px;">載入中…</div></div>
  </aside>
  <main class="main">
    <div class="page-title">📝 提交客訴</div>

    <div class="card">
      <div id="submitFormGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:14px;">
        <div style="min-width:0;"><label class="form-label">日期 *</label><input type="date" class="form-control" id="fDate"></div>
        <div><label class="form-label">門市／客戶 *</label>
          <select class="form-control" id="fStore"></select>
        </div>
        <div><label class="form-label">客訴類型 *</label>
          <select class="form-control" id="fType">
            <option value="品質問題">品質問題</option>
            <option value="配送問題">配送問題</option>
            <option value="數量問題">數量問題</option>
            <option value="其他">其他</option>
          </select>
        </div>
        <div><label class="form-label">相關品項</label>
          <select class="form-control" id="fItem">
            <option value="">選填</option>
            <option value="雞肉">雞肉</option>
            <option value="好吃醬">好吃醬</option>
            <option value="雞湯">雞湯</option>
            <option value="辣椒">辣椒</option>
            <option value="貢丸">貢丸</option>
            <option value="魚丸">魚丸</option>
          </select>
        </div>
        <div style="grid-column:1/-1;"><label class="form-label">問題描述 *</label><textarea class="form-control" id="fDesc" placeholder="請詳細描述客訴內容…"></textarea></div>
        <div style="grid-column:1/-1;">
          <label class="form-label">附加照片</label>
          <input type="file" class="form-control" id="fMedia" accept="image/jpeg,image/png,image/webp,image/gif" onchange="previewMedia()">
          <div style="font-size:11px;color:var(--text3);margin-top:4px;">支援 JPG、PNG、WEBP、GIF，圖片會自動壓縮</div>
          <div id="mediaPreview" style="margin-top:10px;"></div>
        </div>
      </div>
      <button class="btn btn-primary" id="submitBtn" onclick="submitComplaint()">📨 送出客訴</button>
    </div>
  </main>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, setDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { firebaseConfig } from "./firebase-config.js";
import { getUserData, showToast, todayStr, renderSidebar, STORES } from "./app.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app, 'default');
let _ud;

window.toggleMenu = () => { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('show'); };
window.doSignOut = async () => { sessionStorage.clear(); await signOut(auth); window.location.href = 'index.html'; };

document.getElementById('fDate').value = todayStr();
document.getElementById('fStore').innerHTML = STORES.map(s => `<option value="${s}">${s}</option>`).join('');

onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = 'index.html'; return; }
  _ud = await getUserData(db, user);
  if (_ud.role === 'admin' || _ud.role === 'manager') { window.location.href = 'admin.html'; return; }
  if (_ud.store) document.getElementById('fStore').value = _ud.store;
  renderSidebar(_ud, 'submit.html', auth);
});

const ALLOWED_TYPES = ['image/jpeg','image/png','image/webp','image/gif'];

function compressImage(file, maxBytes = 700000) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = e => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        let { width, height } = img;
        const maxDim = 1280;
        if (width > maxDim || height > maxDim) {
          const scale = maxDim / Math.max(width, height);
          width = Math.round(width * scale);
          height = Math.round(height * scale);
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        let quality = 0.8;
        let dataUrl = canvas.toDataURL('image/jpeg', quality);
        while (dataUrl.length > maxBytes && quality > 0.3) {
          quality -= 0.1;
          dataUrl = canvas.toDataURL('image/jpeg', quality);
        }
        resolve(dataUrl);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

window.previewMedia = () => {
  const file = document.getElementById('fMedia').files[0];
  const box = document.getElementById('mediaPreview');
  if (!file) { box.innerHTML = ''; return; }
  if (!ALLOWED_TYPES.includes(file.type)) {
    showToast('只支援 JPG、PNG、WEBP、GIF 圖片格式', 'error');
    document.getElementById('fMedia').value = '';
    box.innerHTML = '';
    return;
  }
  const url = URL.createObjectURL(file);
  box.innerHTML = `<img src="${url}" style="max-width:100%;max-height:200px;border-radius:8px;">`;
};

window.submitComplaint = async () => {
  const date = document.getElementById('fDate').value;
  const store = document.getElementById('fStore').value.trim();
  const desc = document.getElementById('fDesc').value.trim();
  if (!date || !store || !desc) { showToast('請填寫必填欄位', 'error'); return; }
  const file = document.getElementById('fMedia').files[0];
  if (file && !ALLOWED_TYPES.includes(file.type)) { showToast('只支援 JPG、PNG、WEBP、GIF 圖片格式', 'error'); return; }
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '送出中…';
  try {
    let mediaUrl = '';
    if (file) {
      btn.textContent = '處理圖片中…';
      mediaUrl = await compressImage(file);
    }
    const docRef = await addDoc(collection(db, 'complaints'), {
      date, store,
      type: document.getElementById('fType').value,
      item: document.getElementById('fItem').value.trim(),
      desc,
      hasMedia: !!mediaUrl,
      status: '待處理', messages: [],
      submittedBy: _ud.name, submittedUid: auth.currentUser.uid,
      createdAt: serverTimestamp()
    });
    if (mediaUrl) {
      await setDoc(doc(db, 'complaints', docRef.id, 'media', 'img'), { url: mediaUrl });
    }
    showToast('客訴已送出', 'success');
    ['fItem','fDesc'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('fType').value = '品質問題';
    if (_ud.store) document.getElementById('fStore').value = _ud.store;
    document.getElementById('fDate').value = todayStr();
    document.getElementById('fMedia').value = '';
    document.getElementById('mediaPreview').innerHTML = '';
  } catch(err) { showToast('送出失敗，請重試', 'error'); }
  finally { btn.disabled = false; btn.textContent = '📨 送出客訴'; }
};
</script>
</body>
</html>
