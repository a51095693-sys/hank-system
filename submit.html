<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客訴反饋系統 - 提交客訴</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="mob-header">
  <button class="mob-menu-btn" onclick="toggleMenu()">☰</button>
  <span class="mob-title">📝 提交客訴</span>
  <span></span>
</div>
<div class="mob-overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sb-brand"><h2>📢 客訴反饋系統</h2><p>內部管理平台</p></div>
    <nav class="sb-nav" id="sb-nav"></nav>
    <div class="sb-user" id="sb-user-area"><div class="uname" style="color:rgba(255,255,255,.4);font-size:12px;">載入中…</div></div>
  </aside>
  <main class="main">
    <div class="page-title">📝 提交客訴</div>

    <div class="card">
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:14px;">
        <div><label class="form-label">日期 *</label><input type="date" class="form-control" id="fDate"></div>
        <div><label class="form-label">門市／客戶 *</label><input type="text" class="form-control" id="fStore" placeholder="門市或客戶名稱"></div>
        <div><label class="form-label">客訴類型 *</label>
          <select class="form-control" id="fType">
            <option value="品質問題">品質問題</option>
            <option value="配送問題">配送問題</option>
            <option value="數量問題">數量問題</option>
            <option value="其他">其他</option>
          </select>
        </div>
        <div><label class="form-label">相關品項</label><input type="text" class="form-control" id="fItem" placeholder="選填"></div>
        <div style="grid-column:1/-1;"><label class="form-label">問題描述 *</label><textarea class="form-control" id="fDesc" placeholder="請詳細描述客訴內容…"></textarea></div>
        <div style="grid-column:1/-1;"><label class="form-label">客戶聯絡方式</label><input type="text" class="form-control" id="fContact" placeholder="電話或 Email（選填）"></div>
        <div style="grid-column:1/-1;">
          <label class="form-label">附加照片／影片</label>
          <input type="file" class="form-control" id="fMedia" accept="image/*,video/*" onchange="previewMedia()">
          <div id="mediaPreview" style="margin-top:10px;"></div>
        </div>
      </div>
      <button class="btn btn-primary" id="submitBtn" onclick="submitComplaint()">📨 送出客訴</button>
    </div>
  </main>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";
import { firebaseConfig } from "./firebase-config.js";
import { getUserData, showToast, todayStr, renderSidebar } from "./app.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app, 'default');
const storage = getStorage(app);
let _ud;

window.toggleMenu = () => { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('show'); };
window.doSignOut = async () => { sessionStorage.clear(); await signOut(auth); window.location.href = 'index.html'; };

document.getElementById('fDate').value = todayStr();

onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = 'index.html'; return; }
  _ud = getUserData(db, user);
  if (_ud.role === 'admin') { window.location.href = 'admin.html'; return; }
  renderSidebar(_ud, 'submit.html');
});

window.previewMedia = () => {
  const file = document.getElementById('fMedia').files[0];
  const box = document.getElementById('mediaPreview');
  if (!file) { box.innerHTML = ''; return; }
  const url = URL.createObjectURL(file);
  box.innerHTML = file.type.startsWith('video')
    ? `<video src="${url}" controls style="max-width:100%;max-height:200px;border-radius:8px;"></video>`
    : `<img src="${url}" style="max-width:100%;max-height:200px;border-radius:8px;">`;
};

window.submitComplaint = async () => {
  const date = document.getElementById('fDate').value;
  const store = document.getElementById('fStore').value.trim();
  const desc = document.getElementById('fDesc').value.trim();
  if (!date || !store || !desc) { showToast('請填寫必填欄位', 'error'); return; }
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '送出中…';
  try {
    let mediaUrl = '', mediaType = '';
    const file = document.getElementById('fMedia').files[0];
    if (file) {
      btn.textContent = '上傳檔案中…';
      const sRef = ref(storage, `complaints/${Date.now()}_${file.name}`);
      await uploadBytes(sRef, file);
      mediaUrl = await getDownloadURL(sRef);
      mediaType = file.type.startsWith('video') ? 'video' : 'image';
    }
    await addDoc(collection(db, 'complaints'), {
      date, store,
      type: document.getElementById('fType').value,
      item: document.getElementById('fItem').value.trim(),
      desc,
      contact: document.getElementById('fContact').value.trim(),
      mediaUrl, mediaType,
      status: '待處理', reply: '', repliedBy: '',
      submittedBy: _ud.name, submittedUid: auth.currentUser.uid,
      createdAt: serverTimestamp()
    });
    showToast('客訴已送出', 'success');
    ['fStore','fItem','fDesc','fContact'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('fType').value = '品質問題';
    document.getElementById('fDate').value = todayStr();
    document.getElementById('fMedia').value = '';
    document.getElementById('mediaPreview').innerHTML = '';
  } catch(err) { showToast('送出失敗，請重試', 'error'); }
  finally { btn.disabled = false; btn.textContent = '📨 送出客訴'; }
};
</script>
</body>
</html>
